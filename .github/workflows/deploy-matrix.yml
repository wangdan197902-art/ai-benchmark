# GitHub Actions 矩阵部署工作流模板（github-pages-部署器专用）
#
# 使用方式：
#   1. 由 scripts/创建工作流.py 自动填充占位符并写入 .github/workflows/deploy-matrix.yml
#   2. 占位符：wangdan197902-art / bench / ai-term-hub.com / 0.140.0
#   3. 在仓库 Settings → Secrets 中添加 PERSONAL_GITHUB_TOKEN（由 scripts/配置secrets.py 完成）
#   4. 推送到 main 分支即可触发25语种并行部署
#
# 部署目标：25个独立仓库的 gh-pages 分支
# 自定义域名：{lang}.{site_type}.{domain}

name: Deploy Multilingual Sites (Matrix)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SITE_TYPE: bench
  DOMAIN: ai-term-hub.com
  HUGO_VERSION: '0.140.0'
  GITHUB_USER: wangdan197902-art

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lang: [ar, cs, da, de, el, en, es, fi, fr, hu, id, it,
               ja, ko, nl, no, pl, pt, ro, ru, sv, th, tr, vi, zh]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Build ${{ matrix.lang }} site
        run: |
          hugo --config hugo.toml,hugo-${{ matrix.lang }}.toml \
               --minify \
               --destination public-${{ matrix.lang }}

      - name: Prepare single-lang publish dir
        run: |
          # Hugo 构建产物可能出现在两个位置：
          # 1. public-{lang}/{lang}/ 子目录（当 defaultContentLanguageInSubdir=true 时）
          # 2. public-{lang}/ 根目录（当 defaultContentLanguageInSubdir=false 时，Hugo 会为默认
          #    语种在 /{lang}/ 生成 alias 重定向页面，指向根 URL，形成自指跳转 Bug）
          # 本步骤检测 /{lang}/ 子目录是否为 alias 重定向，选择正确的源目录复制
          mkdir -p publish-${{ matrix.lang }}
          LANG_SUBDIR="public-${{ matrix.lang }}/${{ matrix.lang }}"
          if [ -d "$LANG_SUBDIR" ] && [ -f "$LANG_SUBDIR/index.html" ] && grep -q 'http-equiv.*refresh' "$LANG_SUBDIR/index.html"; then
            # 检测到 alias 重定向：真实内容在根目录（defaultContentLanguageInSubdir=false 的默认语种）
            # 从根目录复制全部内容，然后删除其他语种子目录避免跨语种污染
            cp -r public-${{ matrix.lang }}/* publish-${{ matrix.lang }}/
            for other in ar cs da de el en es fi fr hu id it ja ko nl no pl pt ro ru sv th tr vi zh; do
              if [ "$other" != "${{ matrix.lang }}" ] && [ -d "publish-${{ matrix.lang }}/$other" ]; then
                rm -rf "publish-${{ matrix.lang }}/$other"
              fi
            done
          elif [ -d "$LANG_SUBDIR" ]; then
            # 真实内容在 /{lang}/ 子目录（defaultContentLanguageInSubdir=true）
            cp -r $LANG_SUBDIR/* publish-${{ matrix.lang }}/
            for shared in css js images fonts static assets; do
              if [ -d "public-${{ matrix.lang }}/$shared" ]; then
                cp -r "public-${{ matrix.lang }}/$shared" "publish-${{ matrix.lang }}/"
              fi
            done
            for f in favicon.svg logo.svg og-image.svg site.webmanifest llms.txt BingSiteAuth.xml; do
              if [ -f "public-${{ matrix.lang }}/$f" ]; then
                cp "public-${{ matrix.lang }}/$f" "publish-${{ matrix.lang }}/"
              fi
            done
          else
            # 无 /{lang}/ 子目录，直接从根目录复制
            cp -r public-${{ matrix.lang }}/* publish-${{ matrix.lang }}/
          fi

      - name: Build Pagefind index
        continue-on-error: true
        run: |
          # 安装 Pagefind（使用直接 URL 避免 CloudCannon→Pagefind 仓库迁移重定向）
          curl -fSL https://github.com/Pagefind/pagefind/releases/download/v1.5.2/pagefind-v1.5.2-x86_64-unknown-linux-musl.tar.gz \
            -o pagefind.tar.gz || { echo "Pagefind 下载失败，跳过索引构建"; exit 0; }
          tar -xzf pagefind.tar.gz || { echo "Pagefind 解压失败，跳过索引构建"; exit 0; }
          chmod +x pagefind
          ./pagefind --version

          # 诊断：检查 publish 目录内容
          echo "=== publish-${{ matrix.lang }} 目录内容（前20项）==="
          ls "publish-${{ matrix.lang }}/" | head -20
          echo "=== HTML 文件数量 ==="
          find "publish-${{ matrix.lang }}" -name "*.html" | wc -l

          # 为当前语种构建索引（直接对 publish 目录索引，输出 /pagefind/ 子目录）
          ./pagefind --site "publish-${{ matrix.lang }}" \
                     --output-subdir "pagefind"

          echo "✅ Pagefind 索引构建完成"
          ls "publish-${{ matrix.lang }}/pagefind/" 2>/dev/null | head -5 || echo "⚠️ pagefind 目录未生成"

      - name: Ensure root index.html
        run: |
          # 兜底：确保 publish-{lang}/index.html 存在
          # 当 public-{lang}/{lang}/ 子目录存在但不是 alias 重定向时，
          # 上面的 elif 分支只复制了子目录内容，漏掉了根目录的 index.html（home page）。
          # 这会导致 GitHub Pages 默认返回 index.xml（RSS），而不是 HTML 首页。
          if [ ! -f "publish-${{ matrix.lang }}/index.html" ]; then
            if [ -f "public-${{ matrix.lang }}/index.html" ]; then
              cp "public-${{ matrix.lang }}/index.html" "publish-${{ matrix.lang }}/"
              echo "✓ 从 public-${{ matrix.lang }}/ 复制 index.html 到 publish-${{ matrix.lang }}/"
            else
              echo "⚠️ public-${{ matrix.lang }}/index.html 也不存在，可能 Hugo 没有生成 home page"
            fi
          fi
          # 同时复制其他可能缺失的顶层文件
          for f in sitemap.xml robots.txt; do
            if [ ! -f "publish-${{ matrix.lang }}/$f" ] && [ -f "public-${{ matrix.lang }}/$f" ]; then
              cp "public-${{ matrix.lang }}/$f" "publish-${{ matrix.lang }}/"
              echo "✓ 从 public-${{ matrix.lang }}/ 复制 $f"
            fi
          done

      - name: Add CNAME and .nojekyll
        run: |
          echo "${{ matrix.lang }}.${{ env.SITE_TYPE }}.${{ env.DOMAIN }}" > publish-${{ matrix.lang }}/CNAME
          touch publish-${{ matrix.lang }}/.nojekyll
          # IndexNow API Key 文件（用于 Bing/Yandex 即时索引推送）
          echo "a0f6b5032dd63cf84271ae3ab4fcaf86" > publish-${{ matrix.lang }}/a0f6b5032dd63cf84271ae3ab4fcaf86.txt

      - name: Deploy to ${{ matrix.lang }}.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
          external_repository: ${{ env.GITHUB_USER }}/${{ env.SITE_TYPE }}-${{ matrix.lang }}
          publish_branch: gh-pages
          publish_dir: ./publish-${{ matrix.lang }}
          force_orphan: true
          user_name: 'Deploy Agent'
          user_email: 'deploy@ai-term-hub.com'
          commit_message: 'Auto-deploy ${{ matrix.lang }} site (single-lang)'

      - name: Notify deployment
        run: |
          echo "✅ Deployed: https://${{ matrix.lang }}.${{ env.SITE_TYPE }}.${{ env.DOMAIN }}"
          echo "📦 Repository: https://github.com/${{ env.GITHUB_USER }}/${{ env.SITE_TYPE }}-${{ matrix.lang }}"
