baseURL = "/"
languageCode = "en-us"
title = "AI Benchmark Hub"
DefaultContentLanguage = "en"
enableRobotsTXT = true
enableEmoji = true

[params]
  description = "AI Model Benchmark Comparison"
  author = "Website Project"
  # Google Search Console 验证（主入口 bench.ai-term-hub.com）
  google_site_verification = "Po21SS8ccODMgK6x0_LBsBX0t5qz7bdqRzASwE-ngyo"

[outputs]
  home = ["HTML", "RSS", "JSON"]
  page = ["HTML"]

[taxonomies]
  category = "categories"
  tag = "tags"

[languages]
  [languages.en]
    languageName = "English"
    weight = 1

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

# 相关内容索引配置（用于 .Site.RegularPages.Related 查询，生成"相关推荐"）
[related]
  threshold = 80
  includeNewer = true
  toLower = false
  [[related.indices]]
    name = "tags"
    weight = 100
  [[related.indices]]
    name = "categories"
    weight = 80
  [[related.indices]]
    name = "model_id"
    weight = 60
