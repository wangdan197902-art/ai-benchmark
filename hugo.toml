baseURL = "/"
languageCode = "en-us"
title = "AI Benchmark Hub"
DefaultContentLanguage = "en"
enableRobotsTXT = true
enableEmoji = true

[params]
  description = "AI Model Benchmark Comparison"
  author = "Website Project"
  # Google Search Console 验证（主入口 bench.ai-term-hub.com）
  google_site_verification = "Po21SS8ccODMgK6x0_LBsBX0t5qz7bdqRzASwE-ngyo"
  # SEO 验证与追踪参数（与 hugo-{lang}.toml 保持一致，确保主域名也有这些标签）
  ahrefs_site_verification = "ad7fa89d439de59a24f2c0539f078231d409b57876cd4088b2e41eafe03df321"
  google_analytics_id = "G-15279420781"
  adsense_client = "ca-pub-XXXXXXXXXXXXXXXX"
  indexnow_api_key = "a0f6b5032dd63cf84271ae3ab4fcaf86"

[outputs]
  home = ["HTML", "RSS", "JSON"]
  page = ["HTML"]

[taxonomies]
  category = "categories"
  tag = "tags"

[languages]
  [languages.en]
    languageName = "English"
    weight = 1

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

# HTML 压缩配置：保留属性引号，确保 canonical / GSV 等关键 meta 标签
# 能被外部校验脚本（如 125域名全面排查.py）的正则 `rel="canonical"` 匹配到
[minify]
  [minify.tdewolff]
    [minify.tdewolff.html]
      keepQuotes = true

# 相关内容索引配置（用于 .Site.RegularPages.Related 查询，生成"相关推荐"）
[related]
  threshold = 80
  includeNewer = true
  toLower = false
  [[related.indices]]
    name = "tags"
    weight = 100
  [[related.indices]]
    name = "categories"
    weight = 80
  [[related.indices]]
    name = "model_id"
    weight = 60
