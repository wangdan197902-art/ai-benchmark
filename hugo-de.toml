# Hugo 单语种配置模板（GitHub Pages 部署器专用）
#
# 使用方式：
#   1. 由 scripts/创建hugo配置.py 自动填充占位符并生成 hugo-{lang}.toml
#   2. 占位符：de / Deutsch / bench / ai-term-hub.com / https://bench-de.ai-term-hub.com/
#   3. 与主 hugo.toml 一起使用：hugo --config hugo.toml,hugo-{lang}.toml
#
# 此配置会覆盖 hugo.toml 中的对应字段，实现单语种独立构建

# ===== 基础URL（绑定自购三级域名） =====
baseURL = "https://bench-de.ai-term-hub.com/"

# ===== 语言设置 =====
languageCode = "de"
languageName = "Deutsch"
defaultContentLanguage = "de"

# ===== 单语种构建：禁用其他语种 =====
# 只构建当前语种，避免生成25个语种子目录
[languages]
  [languages.de]
    weight = 1
    title = "AI Benchmark Hub - Deutsch"

# ===== SEO优化参数 =====
[params]
  # 当前语种
  currentLanguage = "de"

  # 站点描述（按语种翻译）
  description = "AI Benchmark Hub in Deutsch - AI Model Benchmark Comparison"

  # 自定义域名
  customDomain = "bench-de.ai-term-hub.com"

  # 部署平台信息
  deploymentPlatform = "github-pages"
  repositoryName = "bench-de"

  # canonical（指向当前语种子站首页）
  canonical = "https://bench-de.ai-term-hub.com/"

  # SEO 验证与追踪参数（由 scripts/添加验证标签.py 同步注入 layouts/seo.html）
  # 这些值会被 Hugo 模板读取并输出对应 meta 标签
  google_site_verification = "Po21SS8ccODMgK6x0_LBsBX0t5qz7bdqRzASwE-ngyo"
  ahrefs_site_verification = "ad7fa89d439de59a24f2c0539f078231d409b57876cd4088b2e41eafe03df321"
  google_analytics_id = "G-15279420781"
  # AdSense 客户端ID（需替换 XXXXXXXXXXXXXXXX 为真实值）
  adsense_client = "ca-pub-XXXXXXXXXXXXXXXX"
  # IndexNow API Key（用于 Bing/Yandex 即时索引推送）
  indexnow_api_key = "a0f6b5032dd63cf84271ae3ab4fcaf86"

  # Hreflang alternates（指向其他语种子站）
  # 用于SEO多语种信号传递
  [params.alternates]
    ar = "https://bench-ar.ai-term-hub.com/"
    cs = "https://bench-cs.ai-term-hub.com/"
    da = "https://bench-da.ai-term-hub.com/"
    de = "https://bench-de.ai-term-hub.com/"
    el = "https://bench-el.ai-term-hub.com/"
    en = "https://bench-en.ai-term-hub.com/"
    es = "https://bench-es.ai-term-hub.com/"
    fi = "https://bench-fi.ai-term-hub.com/"
    fr = "https://bench-fr.ai-term-hub.com/"
    hu = "https://bench-hu.ai-term-hub.com/"
    id = "https://bench-id.ai-term-hub.com/"
    it = "https://bench-it.ai-term-hub.com/"
    ja = "https://bench-ja.ai-term-hub.com/"
    ko = "https://bench-ko.ai-term-hub.com/"
    nl = "https://bench-nl.ai-term-hub.com/"
    no = "https://bench-no.ai-term-hub.com/"
    pl = "https://bench-pl.ai-term-hub.com/"
    pt = "https://bench-pt.ai-term-hub.com/"
    ro = "https://bench-ro.ai-term-hub.com/"
    ru = "https://bench-ru.ai-term-hub.com/"
    sv = "https://bench-sv.ai-term-hub.com/"
    tr = "https://bench-tr.ai-term-hub.com/"
    vi = "https://bench-vi.ai-term-hub.com/"
    zh = "https://bench-zh.ai-term-hub.com/"

# ===== Sitemap 配置（单语种独立sitemap） =====
[sitemap]
  changefreq = "weekly"
  priority = 0.8
  filename = "sitemap.xml"
